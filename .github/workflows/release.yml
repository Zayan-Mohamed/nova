name: Release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]*" # matches v0.1.0, v1.0.0, v1.2.3-beta.1, etc.

permissions:
    contents: write # required to create GitHub Releases and upload assets

jobs:
    goreleaser:
        name: GoReleaser
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code (full history for changelog)
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Verify go.sum is up to date
              run: |
                  go mod tidy
                  git diff --exit-code go.mod go.sum

            - name: Run go vet before release
              run: go vet ./...

            - name: Run tests before release
              run: go test -race -count=1 ./...

            - name: Run GoReleaser
              uses: goreleaser/goreleaser-action@v6
              with:
                  distribution: goreleaser
                  version: "~> v2"
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
