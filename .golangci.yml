# golangci-lint configuration for NOVA
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  enable:
    - errcheck # check all errors are handled
    - govet # go vet checks
    - ineffassign # detect ineffectual assignments
    - staticcheck # static analysis
    - unused # unused code
    - gosec # security issues
    - gochecknoglobals # flag global vars (except whitelisted)
    - godot # doc comments end with period
    - misspell # typos in comments and strings
    - prealloc # slice preallocation suggestions
    - revive # general Go linting rules
    - unconvert # unnecessary type conversions
    - unparam # unused function parameters
    - whitespace # trailing whitespace

  settings:
    gosec:
      excludes:
        # G204: subprocess launched with variable — we deliberately use
        # structured exec.Command calls; shell injection is already mitigated
        # by our input validation layer. This exclusion is intentional.
        - G204
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck

  exclusions:
    rules:
      # Test files are exempt from some rules.
      - path: "_test\\.go"
        linters:
          - gosec
          - gochecknoglobals
      # cmd/ requires globals for Cobra (rootCmd) and ldflags version injection.
      - path: "^cmd/"
        linters:
          - gochecknoglobals
      # main.go requires globals for ldflags version injection.
      - path: "^main\\.go$"
        linters:
          - gochecknoglobals
      # ui.go uses package-level Lipgloss styles/colours — idiomatic Go.
      - path: "^internal/ui/"
        linters:
          - gochecknoglobals
      # risk.go uses a package-level immutable lookup table for dangerous ports.
      - path: "^internal/risk/"
        linters:
          - gochecknoglobals

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
